{% extends 'recipes/base.html' %}

{% block content %}
<h1>Your Wishlist</h1>

<ul>
    {% for item in items %}
        <li>
            <a href="{% url 'recipe_detail' item.recipe.id %}">
                {{ item.recipe.name }}
            </a>
        </li>
    {% empty %}
        <p>No items in wishlist.</p>
    {% endfor %}
</ul>

{% endblock %}

{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Recipes</title>

    <!-- Link external CSS -->
    <link rel="stylesheet" href="{% static 'recipes/style.css' %}">
</head>
<body>

    <!-- NAVIGATION BAR -->
    <nav class="navbar">

        <!-- LEFT SIDE (Home + Wishlist) -->
        <div class="nav-left">
            <a href="/">Home</a>

            <!-- Wishlist visible only when logged in -->
            {% if user.is_authenticated %}
                <a href="/wishlist/">Wishlist</a>
            {% endif %}
        </div>


        <!-- RIGHT SIDE (Login/Register OR Logout) -->
        <div class="nav-right">

            {% if user.is_authenticated %}

                <!-- Logout form (POST required by Django) -->
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">Logout</button>
                </form>

            {% else %}

                <!-- Login & Register when user not logged in -->
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Register</a>

            {% endif %}

        </div>

    </nav>


    <!-- MAIN PAGE CONTENT -->
    <div class="container">

        <!-- Welcome message -->
        {% if user.is_authenticated %}
            <p class="welcome">Welcome, {{ user.username }}!</p>
        {% endif %}

        <!-- Child templates load here -->
        {% block content %}{% endblock %}

    </div>

</body>
</html>
